databases:
  - name: sauditrade-db
    databaseName: sauditrade
    user: sauditrade_user
    plan: free

services:
  - type: web
    name: sauditrade
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn saudi_exports_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sauditrade-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@saudiexports.sa
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

